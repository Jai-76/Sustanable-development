version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MODEL_CACHE_DIR=/app/ml/artefacts
    volumes:
      - ./ml/artefacts:/app/ml/artefacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  simulator:
    build:
      context: ./sensors
      dockerfile: Dockerfile
    environment:
      - API_URL=http://backend:8000
      - INTERVAL=5
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - simulation
